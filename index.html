<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Netflix UI Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background-color: #141414;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  z-index: 100;
}

.logo {
  color: #e50914;
  font-size: 28px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("https://image.tmdb.org/t/p/original/8Y43POKjjKDGI9MH89NW0NAzzp8.jpg")
    center/cover no-repeat;
  display: flex;
  align-items: center;
  padding-left: 60px;
}

.hero-content {
  max-width: 500px;
}

.hero-content h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.hero-content p {
  font-size: 18px;
  margin-bottom: 20px;
}

.hero-buttons button {
  padding: 10px 25px;
  margin-right: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  border-radius: 4px;
}

.play-btn {
  background: white;
  color: black;
}

.info-btn {
  background: rgba(109,109,110,0.7);
  color: white;
}

/* ROWS */
.row {
  margin: 40px 20px;
}

.row h2 {
  margin-left: 20px;
  margin-bottom: 10px;
}

.row-posters {
  display: flex;
  overflow-x: auto;
  padding: 20px;
}

.row-posters::-webkit-scrollbar {
  display: none;
}

.poster {
  width: 200px;
  height: 120px;
  margin-right: 15px;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.3s ease;
  object-fit: cover;
}

.poster:hover {
  transform: scale(1.15);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 200;
}

.modal-content {
  background: #181818;
  padding: 30px;
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
}

.close-btn {
  float: right;
  cursor: pointer;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">NETFLIX</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">TV Shows</a>
    <a href="#">Movies</a>
    <a href="#">My List</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Unlimited Movies</h1>
    <p>Watch anywhere. Cancel anytime.</p>
    <div class="hero-buttons">
      <button class="play-btn">▶ Play</button>
      <button class="info-btn">More Info</button>
    </div>
  </div>
</section>

<!-- TRENDING -->
<div class="row">
  <h2>Trending Now</h2>
  <div class="row-posters">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg" onclick="openModal('Joker')">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="openModal('Wonder Woman')">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" onclick="openModal('Dark Knight')">
    
  </div>
</div>

<!-- NETFLIX ORIGINALS -->
<div class="row">
  <h2>Netflix Originals</h2>
  <div class="row-posters">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg" onclick="openModal('Money Heist')">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/u3bZgnGQ9T01sWNhyveQz0wH0Hl.jpg" onclick="openModal('Stranger Things')">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/34nDCQZwaEvsy4CFO5hkGRFDCVU.jpg" onclick="openModal('The Witcher')">
    
  </div>
</div>

<!-- TOP RATED -->
<div class="row">
  <h2>Top Rated</h2>
  <div class="row-posters">
    
    <img class="poster" src="https://image.tmdb.org/t/p/w500/tDexQyu6FWltcd0VhEDK7uib42f.jpg" onclick="openModal('Interstellar')">
    <img class="poster" src="https://image.tmdb.org/t/p/w500/lyQBXzOQSuE59IsHyhrp0qIiPAz.jpg" onclick="openModal('Fight Club')">
    
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="movieModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <h2 id="movieTitle"></h2>
    <p>This is a Netflix-style modal popup using JavaScript.</p>
  </div>
</div>

<script>
function openModal(title) {
  document.getElementById("movieTitle").innerText = title;
  document.getElementById("movieModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("movieModal").style.display = "none";
}
</script>

</body>
</html>
